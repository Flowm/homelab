services:
  onwatch:
    image: ghcr.io/onllm-dev/onwatch:2.11.46
    restart: unless-stopped
    environment:
      ONWATCH_DB_PATH: /data/onwatch.db
    env_file:
      - .env
    ports:
      - 127.0.0.1:9211:9211
    volumes:
      - ./onwatch-data:/data
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
