services:
  homeassistant:
    image: homeassistant/home-assistant:2026.3@sha256:916682086154a7390114a9788782b8efb199852d4f7d47066722c2bc5d1829e6
    restart: unless-stopped
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Europe/Berlin
    network_mode: host
    volumes:
      - ./config:/config
      - ./config/docker/run:/etc/services.d/home-assistant/run
    depends_on:
      database:
        condition: service_healthy
        restart: true

  database:
    image: timescale/timescaledb-ha:pg18-ts2.26@sha256:b441ec1bd8a513473c0695e910565fa01ce039dcda05a860a177fb0faf7b85ac
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASS}
      - POSTGRES_DB=${DATABASE_NAME}
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - postgres_data:/home/postgres/pgdata
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]

  grafana:
    image: grafana/grafana:12.4@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    restart: unless-stopped
    environment:
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASS=${DATABASE_PASS}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_HOST=${DATABASE_HOST}
    ports:
      - 3001:3000
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      database:
        condition: service_healthy
        restart: true

volumes:
  postgres_data:
  grafana_data:
